name: Android Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIREBASE_WEAR_APP_ID: ${{ secrets.FIREBASE_WEAR_APP_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload Handheld Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: planner-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Wear OS Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: planner-wear-debug-apk
          path: wear/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Handheld to Firebase App Distribution
        if: github.event_name != 'pull_request'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk

#      - name: Upload Wear OS to Firebase App Distribution
#        if: github.event_name != 'pull_request' && env.FIREBASE_WEAR_APP_ID != ''
#        uses: wzieba/Firebase-Distribution-Github-Action@v1
#        with:
#          appId: ${{ secrets.FIREBASE_WEAR_APP_ID }}
#          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
#          groups: testers
#          file: wear/build/outputs/apk/debug/wear-debug.apk

  release-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release APK and AAB
        run: |
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload Handheld Release APK
        uses: actions/upload-artifact@v4
        with:
          name: planner-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Handheld Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: planner-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload Wear OS Release APK
        uses: actions/upload-artifact@v4
        with:
          name: planner-wear-release-apk
          path: wear/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Wear OS Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: planner-wear-release-aab
          path: wear/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Latest Build (${{ github.sha }})
          body: |
            Automated release build from main branch.
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            wear/build/outputs/apk/release/*.apk
            wear/build/outputs/bundle/release/*.aab
          make_latest: true
          allowUpdates: true
          failOnUnmatchedFiles: false
